{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Создать проект из обращения{% endblock %}
{% block content %}
<h2>Создать проект из обращения: {{ message.subject }}</h2>
<p><strong>Сообщение клиента:</strong> {{ message.message }}</p>
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Создать проект</button>
    <a href="{% url 'analyst_messages' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
