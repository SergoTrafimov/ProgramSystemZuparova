{% extends 'base.html' %}
{% block title %}Админ-панель{% endblock %}
{% block content %}
<h1>Административная панель</h1>
<div class="row">
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h5 class="card-title">Пользователи</h5>
                <p class="display-4">{{ users_count }}</p>
                <a href="{% url 'admin_user_list' %}" class="btn btn-primary">Управление</a>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h5 class="card-title">Проекты</h5>
                <p class="display-4">{{ projects_count }}</p>
                <a href="{% url 'admin_project_list' %}" class="btn btn-primary">Управление</a>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h5 class="card-title">Задачи</h5>
                <p class="display-4">{{ tasks_count }}</p>
                <a href="{% url 'admin_task_list' %}" class="btn btn-primary">Управление</a>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <!-- Новая карточка Организации -->
        <div class="card text-center">
            <div class="card-body">
                <h5 class="card-title">Организации</h5>
                <p class="display-4">{{ orgs_count }}</p>
                <a href="{% url 'admin_organization_list' %}" class="btn btn-primary">Управление</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
