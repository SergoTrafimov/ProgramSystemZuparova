{% extends 'base.html' %}
{% block title %}Проекты{% endblock %}
{% block content %}
<h2>Проекты</h2>
<a href="{% url 'admin_dashboard' %}" class="btn btn-secondary mb-3">Назад</a>
<table class="table table-striped">
    <thead><tr><th>ID</th><th>Название</th><th>Куратор</th><th>Действия</th></tr></thead>
    <tbody>
        {% for project in projects %}
        <tr>
            <td>{{ project.id }}</td>
            <td>{{ project.name }}</td>
            <td>{{ project.curator|default:"Не назначен" }}</td>
            <td>
                <a href="{% url 'admin_project_edit' project.id %}" class="btn btn-sm btn-warning">Редактировать</a>
                <a href="{% url 'admin_project_delete' project.id %}" class="btn btn-sm btn-danger">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
