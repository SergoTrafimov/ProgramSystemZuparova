{% extends 'base.html' %}
{% block title %}Удаление организации{% endblock %}
{% block content %}
<h2>Удаление организации: {{ org.name }}</h2>
<p>Вы уверены, что хотите удалить организацию?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'admin_organization_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
